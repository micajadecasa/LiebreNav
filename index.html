<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiebreNav Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="lib/maplibre-gl.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta name="theme-color" content="#007AFF">
</head>
<body>
    <div id="splash">
        <div class="splash-logo">
            <span class="material-symbols-outlined" style="font-size: 80px; color: #fff;">navigation</span>
            <h1 style="color: white; margin-top: 10px;">LiebreNav Pro</h1>
        </div>
    </div>

    <div id="app">
        <!-- Notificaciones -->
        <div id="toast" class="hidden"></div>

        <!-- BARRA DE BUSQUEDA Y WAYPOINTS -->
        <header id="search-header">
            <div class="search-row">
                <button id="btn-menu" class="material-symbols-outlined">menu</button>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Buscar destino...">
                    <button id="btn-add-stop" class="material-symbols-outlined hidden" title="Añadir parada">add_circle</button>
                </div>
            </div>
            <div id="waypoints-list-ui" class="hidden">
                <!-- Se llena dinámicamente -->
            </div>
            <ul id="search-results" class="hidden"></ul>
        </header>

        <!-- MAPA -->
        <div id="map"></div>

        <!-- CONTROLES FLOTANTES -->
        <div id="floating-controls">
            <button id="btn-location" class="fab material-symbols-outlined">my_location</button>
            <button id="btn-overview" class="fab secondary material-symbols-outlined hidden">map</button>
        </div>

        <!-- NAVEGACIÓN HUD (ESTILO GARMIN) -->
        <div id="nav-hud" class="hidden">
            <div class="hud-top">
                <div class="instruction-box">
                    <span id="nav-icon" class="material-symbols-outlined">navigation</span>
                    <div class="instruction-text">
                        <span id="nav-dist-next">0 m</span>
                        <span id="nav-text">Sigue la ruta</span>
                    </div>
                </div>
                <div class="nav-progress"><div id="nav-progress-bar"></div></div>
            </div>

            <div class="hud-bottom">
                <div class="stat-box">
                    <span class="label">VELOCIDAD</span>
                    <span id="nav-speed" class="value">0 <small>km/h</small></span>
                </div>
                <div class="stat-box main">
                    <span id="nav-eta" class="value">--:--</span>
                    <span class="label">LLEGADA</span>
                </div>
                <div class="stat-box">
                    <span class="label">DISTANCIA</span>
                    <span id="nav-dist-total" class="value">0 <small>km</small></span>
                </div>
                <div class="hud-actions">
                    <button id="btn-mute-nav" class="material-symbols-outlined">volume_up</button>
                    <button id="btn-stop-nav" class="btn-exit material-symbols-outlined">close</button>
                </div>
            </div>
        </div>

        <!-- PANEL DE RUTA (RESUMEN) -->
        <div id="route-panel" class="hidden">
            <div class="route-details">
                <div class="detail"><span class="material-symbols-outlined">schedule</span> <span id="route-time">0 min</span></div>
                <div class="detail"><span class="material-symbols-outlined">distance</span> <span id="route-distance">0 km</span></div>
            </div>
            <div class="route-buttons">
                <button id="btn-start-nav" class="btn-go">INICIAR</button>
                <button id="btn-save-route" class="btn-icon material-symbols-outlined">save</button>
                <button id="btn-clear-route" class="btn-icon material-symbols-outlined">delete</button>
            </div>
        </div>

        <!-- MENU LATERAL -->
        <nav id="sidebar" class="hidden">
            <div class="sidebar-header">
                <h2>Ajustes</h2>
                <button id="close-menu" class="material-symbols-outlined">close</button>
            </div>
            <div class="sidebar-body">
                <div class="pref-group">
                    <label>Transporte</label>
                    <select id="pref-transport">
                        <option value="driving">🚗 Coche</option>
                        <option value="motorcycle">🏍️ Moto</option>
                        <option value="cycling">🚲 Bici</option>
                        <option value="walking">🚶 Caminar</option>
                    </select>
                </div>
                <div class="pref-toggle">
                    <span>Modo Oscuro</span>
                    <input type="checkbox" id="pref-dark-mode">
                </div>
                <div class="pref-toggle">
                    <span>Voz</span>
                    <input type="checkbox" id="pref-voice" checked>
                </div>
                <button id="btn-open-saved" class="btn-secondary">Mis Rutas Guardadas</button>
            </div>
        </nav>
    </div>

    <script src="lib/maplibre-gl.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
